<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Interactivo — Costa Rica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:#0c1a12;color:#e8efe3;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(34,87,55,.25) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(20,60,80,.2) 0%,transparent 50%);pointer-events:none;z-index:0}
  .app{position:relative;z-index:1;width:100%;max-width:920px;padding:2rem 1rem}
  h1{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,4vw,2.6rem);font-weight:400;text-align:center;margin-bottom:.25rem;letter-spacing:-.02em;background:linear-gradient(135deg,#a8d5a2 0%,#5ec4a0 50%,#7ecfc0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .subtitle{text-align:center;font-size:.85rem;color:rgba(168,213,162,.5);margin-bottom:2rem;letter-spacing:.15em;text-transform:uppercase}
</style>
</head>
<body>
<div class="app">
  <h1>Costa Rica</h1>
  <p class="subtitle">Guía turística interactiva</p>
  <mapa-costa-rica></mapa-costa-rica>
</div>

<script>
class MapaCostaRica extends HTMLElement {
  static get observedAttributes(){return ['active-region']}

  constructor(){
    super(); this.attachShadow({mode:'open'});
    this._currentProv = null;
    this._currentPin = null;
    // Camera state
    this._cam = { x:0, y:0, s:1 };
    this._camTarget = { x:0, y:0, s:1 };
    this._animId = null;
    // Drag
    this._drag = { active:false, startX:0, startY:0, camStartX:0, camStartY:0, moved:false };
    // Inertia
    this._vel = { x:0, y:0 };
    this._lastMouse = { x:0, y:0, t:0 };
    // Limits
    this._minScale = 1;
    this._maxScale = 6;
  }

  get provincias(){return{
    CRG:{nombre:'Guanacaste',color:'#D4841A', cx:300, cy:180, zoom:2.8},
    CRA:{nombre:'Alajuela',color:'#2E86DE', cx:500, cy:160, zoom:3.0},
    CRH:{nombre:'Heredia',color:'#8E44AD', cx:620, cy:185, zoom:4.5},
    CRSJ:{nombre:'San José',color:'#27AE60', cx:590, cy:310, zoom:3.5},
    CRC:{nombre:'Cartago',color:'#E85D4A', cx:680, cy:280, zoom:4.0},
    CRL:{nombre:'Limón',color:'#1ABC9C', cx:780, cy:280, zoom:2.2},
    CRP:{nombre:'Puntarenas',color:'#E67E22', cx:420, cy:400, zoom:1.6},
  }}

  get destinos(){return[
    {id:'g1',nombre:'Tamarindo',prov:'CRG',cx:205,cy:218,desc:'Surf de clase mundial y atardeceres dorados sobre el Pacífico. Uno de los destinos más visitados de Guanacaste, con una vibrante vida nocturna y tours de avistamiento de tortugas.',img:'https://images.unsplash.com/photo-1621451537084-482c73073a0f?w=400&h=260&fit=crop',actividades:['Surf','Snorkel','Yoga','Tortugas'],horario:'Acceso libre 24h',entrada:'Gratuito'},
    {id:'g2',nombre:'Rincón de la Vieja',prov:'CRG',cx:310,cy:118,desc:'Volcán activo con fumarolas, pozas de barro caliente y cascadas escondidas entre senderos de bosque tropical seco.',img:'https://images.unsplash.com/photo-1552083375-1447ce886485?w=400&h=260&fit=crop',actividades:['Senderismo','Aguas termales','Canopy','Cabalgata'],horario:'8:00 AM – 3:00 PM',entrada:'$15 USD'},
    {id:'g3',nombre:'Playa Flamingo',prov:'CRG',cx:188,cy:195,desc:'Arena blanca, aguas cristalinas y marina para deportes acuáticos en la costa dorada de Guanacaste.',img:'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400&h=260&fit=crop',actividades:['Buceo','Pesca deportiva','Kayak'],horario:'Acceso libre',entrada:'Gratuito'},
    {id:'a1',nombre:'Volcán Arenal',prov:'CRA',cx:445,cy:158,desc:'El volcán más famoso de Costa Rica. Su cono perfecto se alza sobre La Fortuna ofreciendo aguas termales naturales y senderos de lava.',img:'https://images.unsplash.com/photo-1580767528793-7ee6c405b365?w=400&h=260&fit=crop',actividades:['Senderismo','Aguas termales','Rappel','Puentes colgantes'],horario:'8:00 AM – 4:00 PM',entrada:'$15 USD'},
    {id:'a2',nombre:'La Fortuna',prov:'CRA',cx:462,cy:148,desc:'Cataratas de 70m de altura, puentes colgantes sobre el dosel del bosque y rafting en el río Pacuare.',img:'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=400&h=260&fit=crop',actividades:['Catarata','Puentes colgantes','Rafting'],horario:'7:00 AM – 5:00 PM',entrada:'$18 USD'},
    {id:'h1',nombre:'Barva',prov:'CRH',cx:610,cy:195,desc:'Volcán Barva dentro del Parque Nacional Braulio Carrillo. Bosque nuboso prístino con lagunas volcánicas.',img:'https://images.unsplash.com/photo-1440581572325-0bea30075d9d?w=400&h=260&fit=crop',actividades:['Senderismo','Observación de aves','Laguna Barva'],horario:'8:00 AM – 3:30 PM',entrada:'$12 USD'},
    {id:'s1',nombre:'Volcán Poás',prov:'CRSJ',cx:560,cy:235,desc:'Uno de los cráteres activos más accesibles del mundo. Su laguna ácida de color turquesa es una vista impresionante a 2.708 msnm.',img:'https://images.unsplash.com/photo-1552083375-1447ce886485?w=400&h=260&fit=crop',actividades:['Mirador del cráter','Sendero Botos','Laguna Botos'],horario:'7:00 AM – 1:00 PM',entrada:'$15 USD'},
    {id:'s2',nombre:'Centro Histórico SJ',prov:'CRSJ',cx:596,cy:280,desc:'El corazón cultural de Costa Rica: Teatro Nacional, Museo del Oro, Mercado Central y arquitectura colonial.',img:'https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=400&h=260&fit=crop',actividades:['Teatro Nacional','Museos','Gastronomía','Mercados'],horario:'Varía según lugar',entrada:'Varía'},
    {id:'c1',nombre:'Valle de Orosi',prov:'CRC',cx:680,cy:290,desc:'Valle verde rodeado de montañas con plantaciones de café de altura, las ruinas coloniales de Ujarrás y aguas termales.',img:'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=400&h=260&fit=crop',actividades:['Tour de café','Ruinas de Ujarrás','Aguas termales','Mirador'],horario:'Todo el día',entrada:'Tours desde $25'},
    {id:'c2',nombre:'Volcán Irazú',prov:'CRC',cx:700,cy:255,desc:'A 3.432m, es el volcán más alto de Costa Rica. En días claros se pueden ver ambos océanos desde su cima.',img:'https://images.unsplash.com/photo-1552083375-1447ce886485?w=400&h=260&fit=crop',actividades:['Mirador del cráter','Senderismo','Fotografía'],horario:'8:00 AM – 3:30 PM',entrada:'$15 USD'},
    {id:'l1',nombre:'Tortuguero',prov:'CRL',cx:748,cy:218,desc:'La "Amazonía de Costa Rica". Red de canales navegables y uno de los sitios de desove de tortuga verde más importantes del mundo.',img:'https://images.unsplash.com/photo-1437622368342-7a3d73a34c8f?w=400&h=260&fit=crop',actividades:['Tour en bote','Desove de tortugas','Kayak','Caminata nocturna'],horario:'6:00 AM – 4:00 PM',entrada:'$15 USD'},
    {id:'l2',nombre:'Cahuita',prov:'CRL',cx:815,cy:310,desc:'Parque Nacional con el arrecife de coral más importante de Costa Rica. Playas de arena blanca y negra junto a bosque tropical.',img:'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400&h=260&fit=crop',actividades:['Snorkel','Senderismo costero','Playa Blanca'],horario:'8:00 AM – 4:00 PM',entrada:'Donación voluntaria'},
    {id:'l3',nombre:'Puerto Viejo',prov:'CRL',cx:838,cy:340,desc:'Capital del surf caribeño. Cultura afrocaribeña, rice and beans, reggae y la famosa Playa Cocles.',img:'https://images.unsplash.com/photo-1621451537084-482c73073a0f?w=400&h=260&fit=crop',actividades:['Surf','Ciclismo','Gastronomía caribeña','Refugio de Jaguar'],horario:'Acceso libre',entrada:'Gratuito'},
    {id:'p1',nombre:'Monteverde',prov:'CRP',cx:398,cy:222,desc:'Reserva del bosque nuboso mundialmente famosa. Puentes colgantes, canopy y oportunidad de ver al quetzal resplandeciente.',img:'https://images.unsplash.com/photo-1440581572325-0bea30075d9d?w=400&h=260&fit=crop',actividades:['Puentes colgantes','Night tour','Canopy','Mariposario'],horario:'7:00 AM – 4:00 PM',entrada:'$25 USD'},
    {id:'p2',nombre:'Manuel Antonio',prov:'CRP',cx:498,cy:430,desc:'El parque nacional más visitado de Costa Rica. Playas de arena blanca rodeadas de selva tropical con monos, perezosos y tucanes.',img:'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400&h=260&fit=crop',actividades:['Playas','Senderismo','Fauna silvestre','Kayak'],horario:'7:00 AM – 4:00 PM',entrada:'$16 USD'},
    {id:'p3',nombre:'Uvita',prov:'CRP',cx:530,cy:478,desc:'Hogar de la famosa Cola de Ballena formada por una playa natural. De julio a octubre se avistan ballenas jorobadas.',img:'https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=400&h=260&fit=crop',actividades:['Avistamiento de ballenas','Cola de Ballena','Snorkel'],horario:'7:00 AM – 4:00 PM',entrada:'$6 USD'},
  ]}

  connectedCallback(){ this.shadowRoot.innerHTML = `<style>${this._css()}</style>${this._html()}`; this._bindAll(); }
  attributeChangedCallback(n,o,v){ if(n==='active-region') this._zoomProv(v||null); }

  /* ═══════════════ CSS ═══════════════ */
  _css(){return `
:host{display:block;width:100%}
.wrap{position:relative;border-radius:16px;overflow:hidden;background:#0f2318;border:1px solid rgba(168,213,162,.12);box-shadow:0 8px 40px rgba(0,0,0,.4),inset 0 1px 0 rgba(168,213,162,.06)}
.vp{position:relative;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;cursor:grab;height:0;padding-bottom:100%}
.vp.dragging{cursor:grabbing}
.cam{position:absolute;inset:0;transform-origin:0 0;will-change:transform;transition:transform .7s cubic-bezier(.25,.46,.45,.94)}
.cam.no-transition{transition:none}
svg{display:block;width:100%;height:100%}
.prov{fill:#1e5a34;stroke:rgba(168,213,162,.2);stroke-width:1;transition:fill .4s,stroke .4s,filter .4s;cursor:pointer}
.prov:hover{fill:#2a7a48;stroke:rgba(168,213,162,.45);filter:brightness(1.12)}
.prov.active{stroke-width:2;filter:brightness(1.25) drop-shadow(0 0 12px rgba(94,196,160,.35))}
.pl{font-family:'DM Sans',system-ui;font-size:11px;font-weight:600;fill:rgba(168,213,162,.35);pointer-events:none;text-anchor:middle;letter-spacing:.06em;text-transform:uppercase;transition:fill .4s}
.pl.active{fill:rgba(232,239,227,.85)}
.pin{cursor:pointer}
.pin-ring{fill:none;stroke-width:1.5;opacity:0;animation:rp 2.8s ease-in-out infinite}
@keyframes rp{0%,100%{r:10;opacity:0}40%{r:16;opacity:.35}80%{r:22;opacity:0}}
.pin-dot{stroke:#0f2318;stroke-width:1.5;transition:r .25s,filter .25s}
.pin:hover .pin-dot{r:7;filter:brightness(1.3) drop-shadow(0 0 6px currentColor)}
.pin-lbl{font-family:'DM Sans',system-ui;font-size:9.5px;font-weight:500;fill:#e8efe3;text-anchor:middle;pointer-events:none;opacity:0;transition:opacity .3s;paint-order:stroke;stroke:#0f2318;stroke-width:3px;stroke-linecap:round;stroke-linejoin:round}
.pin:hover .pin-lbl{opacity:1}
.pin.active .pin-lbl{opacity:1}
.pin.active .pin-dot{r:8;filter:brightness(1.4) drop-shadow(0 0 10px currentColor)}
.ol{font-family:'DM Sans',system-ui;font-size:10px;font-weight:500;fill:rgba(94,196,160,.12);letter-spacing:.25em;text-transform:uppercase;pointer-events:none}

/* Controls */
.ctrls{display:flex;gap:6px;padding:12px 16px;flex-wrap:wrap;justify-content:center;background:rgba(15,35,24,.95);border-top:1px solid rgba(168,213,162,.08)}
.ctrls button{font-family:'DM Sans',system-ui;font-size:11.5px;font-weight:500;padding:6px 16px;border-radius:20px;border:1px solid rgba(168,213,162,.15);background:transparent;color:rgba(168,213,162,.55);cursor:pointer;transition:all .25s;letter-spacing:.02em}
.ctrls button:hover{border-color:rgba(168,213,162,.35);color:rgba(232,239,227,.85);background:rgba(168,213,162,.06)}
.ctrls button.active{color:#0f2318;border-color:transparent}

/* Reset floating button */
.reset-btn{position:absolute;top:12px;right:12px;z-index:15;width:36px;height:36px;border-radius:50%;border:1px solid rgba(168,213,162,.15);background:rgba(15,35,24,.85);color:rgba(168,213,162,.6);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .3s,background .2s,transform .2s}
.reset-btn.show{opacity:1;pointer-events:all}
.reset-btn:hover{background:rgba(15,35,24,.95);color:#e8efe3;transform:scale(1.08)}

/* Zoom indicator */
.zoom-ind{position:absolute;bottom:12px;right:12px;z-index:15;font-family:'DM Sans',system-ui;font-size:10px;color:rgba(168,213,162,.35);letter-spacing:.04em;pointer-events:none;transition:opacity .3s}

/* Tooltip */
.tip{position:absolute;pointer-events:none;z-index:25;opacity:0;transform:translateY(6px) scale(.94);transition:opacity .2s cubic-bezier(.4,0,.2,1),transform .2s cubic-bezier(.4,0,.2,1);width:230px}
.tip.show{opacity:1;transform:translateY(0) scale(1)}
.tip-in{background:rgba(12,26,18,.94);border:1px solid rgba(168,213,162,.15);border-radius:10px;overflow:hidden;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.tip-img{width:100%;height:115px;object-fit:cover;display:block;background:#0a1f14}
.tip-bd{padding:10px 12px}
.tip-nm{font-family:'DM Serif Display',serif;font-size:14px;color:#e8efe3;margin:0 0 3px}
.tip-pv{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin:0 0 5px}
.tip-dc{font-size:11px;color:rgba(232,239,227,.5);line-height:1.4;margin:0}
.tip-ht{font-size:9px;color:rgba(168,213,162,.3);margin:7px 0 0;text-align:right;letter-spacing:.04em}

/* Modal overlay */
.mo{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(5,12,8,.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:1rem;opacity:0;pointer-events:none;transition:opacity .3s}
.mo.show{opacity:1;pointer-events:all}
.md{background:#0f2318;border:1px solid rgba(168,213,162,.12);border-radius:16px;overflow:hidden;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;transform:translateY(20px) scale(.97);transition:transform .4s cubic-bezier(.16,1,.3,1);box-shadow:0 24px 80px rgba(0,0,0,.6)}
.mo.show .md{transform:translateY(0) scale(1)}
.md-iw{position:relative;width:100%;height:230px;overflow:hidden}
.md-img{width:100%;height:100%;object-fit:cover;display:block;background:#0a1f14}
.md-ig{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,#0f2318);pointer-events:none}
.md-x{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;border:none;background:rgba(15,35,24,.7);color:#e8efe3;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);transition:background .2s}
.md-x:hover{background:rgba(15,35,24,.95)}
.md-bd{padding:20px 24px 24px}
.md-nm{font-family:'DM Serif Display',serif;font-size:1.5rem;color:#e8efe3;margin:0 0 6px}
.md-bg{display:inline-block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:3px 10px;border-radius:12px;margin:0 0 16px}
.md-dc{font-size:14px;color:rgba(232,239,227,.65);line-height:1.65;margin:0 0 22px}
.md-st{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:rgba(168,213,162,.45);margin:0 0 10px}
.md-tags{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 22px}
.md-tag{font-size:11.5px;padding:5px 13px;border-radius:16px;border:1px solid rgba(168,213,162,.12);color:rgba(232,239,227,.7);background:rgba(168,213,162,.04)}
.md-mt{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 0 22px}
.md-mi{padding:12px 14px;border-radius:10px;background:rgba(168,213,162,.04);border:1px solid rgba(168,213,162,.08)}
.md-ml{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:rgba(168,213,162,.4);margin:0 0 4px}
.md-mv{font-size:13px;color:rgba(232,239,227,.8);margin:0}
.md-cta{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(168,213,162,.2);background:transparent;color:#a8d5a2;font-family:'DM Sans',system-ui;font-size:13.5px;font-weight:500;cursor:pointer;transition:all .2s;letter-spacing:.02em}
.md-cta:hover{background:rgba(168,213,162,.1);color:#e8efe3;border-color:rgba(168,213,162,.3)}
.md::-webkit-scrollbar{width:4px}.md::-webkit-scrollbar-track{background:transparent}.md::-webkit-scrollbar-thumb{background:rgba(168,213,162,.15);border-radius:4px}
`}

  /* ═══════════════ HTML ═══════════════ */
  _html(){
    const P = this._paths();
    const labels = {CRG:[300,175],CRA:[500,150],CRH:[620,178],CRSJ:[580,295],CRC:[680,270],CRL:[780,280],CRP:[420,400]};
    let pp=''; for(const[k,d]of Object.entries(P)) if(d) pp+=`<path class="prov" data-p="${k}" d="${d}"/>`;
    let ll=''; for(const[k,[x,y]]of Object.entries(labels)) ll+=`<text class="pl" data-l="${k}" x="${x}" y="${y}">${this.provincias[k]?.nombre||k}</text>`;
    let pins=''; for(const d of this.destinos){ const c=this.provincias[d.prov]?.color||'#a8d5a2'; pins+=`<g class="pin" data-id="${d.id}" data-p="${d.prov}"><circle class="pin-ring" cx="${d.cx}" cy="${d.cy}" r="12" stroke="${c}" style="animation-delay:${(Math.random()*2.5).toFixed(1)}s"/><circle class="pin-dot" cx="${d.cx}" cy="${d.cy}" r="5" fill="${c}" style="color:${c}"/><text class="pin-lbl" x="${d.cx}" y="${d.cy-14}">${d.nombre}</text></g>`; }
    const btns = Object.keys(this.provincias).map(k=>`<button data-b="${k}">${this.provincias[k].nombre}</button>`).join('')+`<button data-b="">Todo CR</button>`;

    return `
<div class="wrap">
  <div class="vp" id="vp">
    <div class="cam" id="cam">
      <svg id="m" viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg">
        <rect width="1000" height="560" fill="#0a1f14"/>
        <text class="ol" x="820" y="50">Mar Caribe</text>
        <text class="ol" x="60" y="540">Océano Pacífico</text>
        <g>${pp}</g><g>${ll}</g><g>${pins}</g>
      </svg>
    </div>
    <button class="reset-btn" id="rbtn" title="Vista completa (ESC)">&#x2716;</button>
    <span class="zoom-ind" id="zi">1.0x</span>
    <div class="tip" id="tip"><div class="tip-in"><img class="tip-img" id="ti" src="" alt=""/><div class="tip-bd"><p class="tip-nm" id="tn"></p><p class="tip-pv" id="tp"></p><p class="tip-dc" id="td"></p><p class="tip-ht">Click para ver más</p></div></div></div>
  </div>
  <div class="ctrls">${btns}</div>
</div>
<div class="mo" id="mo"><div class="md" id="md"><div class="md-iw"><img class="md-img" id="mi" src="" alt=""/><div class="md-ig"></div><button class="md-x" id="mx">&times;</button></div><div class="md-bd"><h2 class="md-nm" id="mn"></h2><span class="md-bg" id="mb"></span><p class="md-dc" id="mdc"></p><p class="md-st">Actividades</p><div class="md-tags" id="mt"></div><p class="md-st">Información práctica</p><div class="md-mt"><div class="md-mi"><p class="md-ml">Horario</p><p class="md-mv" id="mh"></p></div><div class="md-mi"><p class="md-ml">Entrada</p><p class="md-mv" id="me"></p></div></div><button class="md-cta" id="mc">Explorar este destino →</button></div></div></div>`;
  }

  /* ═══════════════ CAMERA SYSTEM ═══════════════ */
  _applyCam(animate=true){
    const cam = this.shadowRoot.getElementById('cam');
    if(!animate) cam.classList.add('no-transition');
    else cam.classList.remove('no-transition');
    cam.style.transform = `scale(${this._cam.s}) translate(${this._cam.x}px, ${this._cam.y}px)`;
    const zi = this.shadowRoot.getElementById('zi');
    if(zi) zi.textContent = this._cam.s.toFixed(1)+'x';
    const rb = this.shadowRoot.getElementById('rbtn');
    if(rb) rb.classList.toggle('show', this._cam.s > 1.05);
  }

  _animCamTo(tx, ty, ts, dur=700){
    const c0 = {...this._cam};
    const t0 = performance.now();
    const ease = t => t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
    if(this._animId) cancelAnimationFrame(this._animId);
    const step = now => {
      const p = Math.min((now-t0)/dur, 1);
      const e = ease(p);
      this._cam.x = c0.x + (tx-c0.x)*e;
      this._cam.y = c0.y + (ty-c0.y)*e;
      this._cam.s = c0.s + (ts-c0.s)*e;
      this._applyCam(false);
      if(p<1) this._animId = requestAnimationFrame(step);
    };
    this._animId = requestAnimationFrame(step);
  }

  _resetCam(){ this._animCamTo(0, 0, 1, 600); this._currentProv=null; this._updateUI(null); }

  // Focus camera on a point (in SVG coords) at a given scale
  _focusOn(svgX, svgY, scale){
    const vp = this.shadowRoot.getElementById('vp');
    const vpW = vp.clientWidth, vpH = vp.clientHeight;
    // SVG is 1000 wide, maps to vpW at scale 1
    const svgPixelRatio = vpW / 1000;
    const tx = (vpW/2) / scale - svgX * svgPixelRatio;
    const ty = (vpH/2) / scale - svgY * svgPixelRatio;
    this._animCamTo(tx, ty, scale, 700);
  }

  /* ═══════════════ EVENTS ═══════════════ */
  _bindAll(){
    const R = this.shadowRoot;
    const vp = R.getElementById('vp');
    const cam = R.getElementById('cam');

    // ── Pointer drag (camera pan) ──
    vp.addEventListener('pointerdown', e => {
      if(e.button !== 0 || e.target.closest('.pin') || e.target.closest('.reset-btn')) return;
      this._drag = { active:true, startX:e.clientX, startY:e.clientY, camStartX:this._cam.x, camStartY:this._cam.y, moved:false };
      this._lastMouse = { x:e.clientX, y:e.clientY, t:performance.now() };
      this._vel = {x:0,y:0};
      vp.classList.add('dragging');
      vp.setPointerCapture(e.pointerId);
      cam.classList.add('no-transition');
    });

    vp.addEventListener('pointermove', e => {
      if(!this._drag.active) return;
      const dx = e.clientX - this._drag.startX;
      const dy = e.clientY - this._drag.startY;
      if(Math.abs(dx)>3 || Math.abs(dy)>3) this._drag.moved = true;
      this._cam.x = this._drag.camStartX + dx / this._cam.s;
      this._cam.y = this._drag.camStartY + dy / this._cam.s;
      this._applyCam(false);
      // Track velocity
      const now = performance.now();
      const dt = now - this._lastMouse.t;
      if(dt > 0){
        this._vel.x = (e.clientX - this._lastMouse.x) / dt;
        this._vel.y = (e.clientY - this._lastMouse.y) / dt;
      }
      this._lastMouse = { x:e.clientX, y:e.clientY, t:now };
    });

    const endDrag = e => {
      if(!this._drag.active) return;
      this._drag.active = false;
      vp.classList.remove('dragging');
      vp.releasePointerCapture(e.pointerId);
      cam.classList.remove('no-transition');
      // Inertia
      if(Math.abs(this._vel.x) > 0.15 || Math.abs(this._vel.y) > 0.15){
        const inertiaX = this._cam.x + this._vel.x * 120 / this._cam.s;
        const inertiaY = this._cam.y + this._vel.y * 120 / this._cam.s;
        this._animCamTo(inertiaX, inertiaY, this._cam.s, 500);
      }
    };
    vp.addEventListener('pointerup', endDrag);
    vp.addEventListener('pointerleave', e => { if(this._drag.active) endDrag(e); });

    // ── Wheel zoom ──
    vp.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = vp.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const oldS = this._cam.s;
      const factor = e.deltaY > 0 ? 0.88 : 1.14;
      const newS = Math.max(this._minScale, Math.min(this._maxScale, oldS * factor));
      // Zoom toward cursor
      this._cam.x = mx / newS - (mx / oldS - this._cam.x);
      this._cam.y = my / newS - (my / oldS - this._cam.y);
      this._cam.s = newS;
      cam.classList.add('no-transition');
      this._applyCam(false);
      clearTimeout(this._wheelTimeout);
      this._wheelTimeout = setTimeout(()=> cam.classList.remove('no-transition'), 100);
      const rb = R.getElementById('rbtn');
      if(rb) rb.classList.toggle('show', newS > 1.05);
    }, {passive:false});

    // ── Province click ──
    R.querySelectorAll('.prov').forEach(p => {
      p.addEventListener('click', () => {
        if(this._drag.moved) return;
        this._zoomProv(p.dataset.p);
      });
    });

    // ── Buttons ──
    R.querySelectorAll('.ctrls button').forEach(b => {
      b.addEventListener('click', () => {
        const id = b.dataset.b || null;
        if(id) this._zoomProv(id);
        else this._resetCam();
      });
    });

    // ── Reset button ──
    R.getElementById('rbtn').addEventListener('click', () => this._resetCam());

    // ── Pin hover / click ──
    R.querySelectorAll('.pin').forEach(p => {
      p.addEventListener('mouseenter', () => this._showTip(p.dataset.id));
      p.addEventListener('mouseleave', () => this._hideTip());
      p.addEventListener('click', e => {
        e.stopPropagation();
        if(!this._drag.moved) this._openModal(p.dataset.id);
      });
    });

    // ── Modal ──
    R.getElementById('mx').addEventListener('click', () => this._closeModal());
    R.getElementById('mo').addEventListener('click', e => { if(e.target.id==='mo') this._closeModal(); });
    R.getElementById('mc').addEventListener('click', () => {
      if(this._currentPin){
        const d = this.destinos.find(x=>x.id===this._currentPin);
        if(d) this.dispatchEvent(new CustomEvent('destino-selected',{detail:{destino:d},bubbles:true,composed:true}));
      }
    });

    // ── ESC ──
    document.addEventListener('keydown', e => {
      if(e.key==='Escape'){
        const mo = R.getElementById('mo');
        if(mo.classList.contains('show')) this._closeModal();
        else this._resetCam();
      }
    });

    // ── Click on empty area to reset ──
    R.getElementById('m').addEventListener('click', e => {
      if(this._drag.moved) return;
      if(!e.target.closest('.prov') && !e.target.closest('.pin')){
        this._resetCam();
      }
    });
  }

  /* ═══════════════ PROVINCE ZOOM ═══════════════ */
  _zoomProv(id){
    this._currentProv = id;
    const prov = this.provincias[id];
    if(!prov) return;
    this._focusOn(prov.cx, prov.cy, prov.zoom);
    this._updateUI(id);
    this.dispatchEvent(new CustomEvent('region-selected',{detail:{region:id},bubbles:true,composed:true}));
  }

  _updateUI(id){
    const R = this.shadowRoot;
    R.querySelectorAll('.prov').forEach(p => {
      if(id && p.dataset.p===id){ p.classList.add('active'); p.style.fill = this.provincias[id].color; }
      else { p.classList.remove('active'); p.style.fill = ''; }
    });
    R.querySelectorAll('.pl').forEach(l => l.classList.toggle('active', !!id && l.dataset.l===id));
    R.querySelectorAll('.ctrls button').forEach(b => {
      const a = b.dataset.b===id;
      b.classList.toggle('active', a);
      b.style.background = a ? (this.provincias[id]?.color||'') : '';
    });
  }

  /* ═══════════════ TOOLTIP ═══════════════ */
  _showTip(id){
    const d = this.destinos.find(x=>x.id===id); if(!d) return;
    const R = this.shadowRoot, vp = R.getElementById('vp'), tip = R.getElementById('tip'), pv = this.provincias[d.prov];
    R.getElementById('ti').src = d.img;
    R.getElementById('tn').textContent = d.nombre;
    const tp = R.getElementById('tp'); tp.textContent = pv?.nombre||''; tp.style.color = pv?.color||'';
    R.getElementById('td').textContent = d.desc.length>75 ? d.desc.substring(0,75)+'…' : d.desc;
    // Position: convert SVG coords to screen via camera transform
    const vpRect = vp.getBoundingClientRect();
    const svgRatio = vpRect.width / 1000;
    const screenX = (d.cx * svgRatio + this._cam.x) * this._cam.s;
    const screenY = (d.cy * svgRatio + this._cam.y) * this._cam.s;
    // Adjusted to vp-relative position, accounting for padding-bottom aspect ratio
    const vpH = vpRect.height;
    const svgRatioY = vpH / 560; // viewBox height is 560
    const sx = (d.cx * svgRatio + this._cam.x) * this._cam.s;
    const sy = (d.cy * svgRatioY + this._cam.y) * this._cam.s;

    let left = sx - 115;
    let top = sy - 280;
    if(top < 8) top = sy + 20;
    if(left < 8) left = 8;
    if(left + 230 > vpRect.width) left = vpRect.width - 238;
    if(top + 260 > vpH) top = vpH - 268;
    tip.style.left = left + 'px';
    tip.style.top = top + 'px';
    tip.classList.add('show');
  }

  _hideTip(){ this.shadowRoot.getElementById('tip').classList.remove('show'); }

  /* ═══════════════ MODAL ═══════════════ */
  _openModal(id){
    this._hideTip();
    this._currentPin = id;
    const d = this.destinos.find(x=>x.id===id); if(!d) return;
    const R = this.shadowRoot, pv = this.provincias[d.prov];
    // Camera focus on pin
    this._focusOn(d.cx, d.cy, 3.5);
    // Highlight
    R.querySelectorAll('.pin').forEach(p => p.classList.toggle('active', p.dataset.id===id));
    R.querySelectorAll('.prov').forEach(p => {
      if(p.dataset.p===d.prov){ p.classList.add('active'); p.style.fill=pv?.color||''; }
      else{ p.classList.remove('active'); p.style.fill=''; }
    });
    // Fill modal
    R.getElementById('mi').src = d.img;
    R.getElementById('mn').textContent = d.nombre;
    const bg = R.getElementById('mb');
    bg.textContent = pv?.nombre||'';
    bg.style.color = pv?.color||'';
    bg.style.background = (pv?.color||'#888')+'18';
    bg.style.border = `1px solid ${pv?.color||'#888'}30`;
    R.getElementById('mdc').textContent = d.desc;
    R.getElementById('mt').innerHTML = (d.actividades||[]).map(a=>`<span class="md-tag">${a}</span>`).join('');
    R.getElementById('mh').textContent = d.horario||'—';
    R.getElementById('me').textContent = d.entrada||'—';
    R.getElementById('mo').classList.add('show');
  }

  _closeModal(){
    const R = this.shadowRoot;
    R.getElementById('mo').classList.remove('show');
    R.querySelectorAll('.pin').forEach(p => p.classList.remove('active'));
    if(this._currentProv) this._zoomProv(this._currentProv);
    else this._resetCam();
    this._currentPin = null;
  }
